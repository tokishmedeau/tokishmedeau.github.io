<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tokish J. Médeau</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
    
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&display=swap" rel="stylesheet">

<style>

body{

    margin:0;
    background:#f8f7f4;
    color:#222;
    font-family:'EB Garamond', serif;
    text-align:center;

}

main{

    max-width:900px;
    margin:auto;
    padding:55px 25px 90px;

}

/* ---------- HEADER IMAGE ---------- */

.hero{

    width:100%;
    height:auto;
    display:block;
    margin:0 auto 60px;
    border-radius:4px;

}

/* ---------- TEXT ---------- */

h1{

    font-family:'Cinzel', serif;
    font-size:clamp(42px,8vw,74px);
    font-weight:600;
    letter-spacing:1.2px;
    margin:18px 0 10px;
    color:#222;

}

h2{

    margin:18px 0 24px;
    font-size:30px;
    font-weight:400;
    color:#555;

}

.tagline{

    margin-bottom:60px;
    font-size:27px;
    color:#555;
    letter-spacing:.5px;

}

/* ---------- BUTTONS ---------- */

.buttons{

    margin:35px 0 85px;

}

.button{

    display:inline-block;
    width:135px;
    margin:6px;
    padding:10px 0;

    font-size:18px;
    letter-spacing:.3px;

    text-align:center;
    text-decoration:none;

    color:#222;
    background:#faf9f7;

    border:1px solid #444;
    border-radius:2px;

    transition:.2s;

}

.button:hover{

    background:#222;
    color:#faf9f7;

}

/* ---------- FOOTER IMAGE ---------- */

.footer-image{

    width:100%;
    height:auto;
    display:block;
    margin-top:100px;
    border-radius:4px;

}

/* ---------- MOBILE ---------- */

@media (max-width:700px){

    main{

        padding:28px 18px 70px;

    }

    .hero{

        margin-bottom:42px;

    }

    h1{

        font-size:clamp(40px,9vw,62px);
        letter-spacing:.6px;

    }

    h2{

        font-size:24px;
        margin:14px 0 16px;

    }

    .tagline{

        font-size:22px;
        margin-bottom:40px;

    }

    .buttons{

        margin:30px 0 70px;

    }

    .button{

        width:120px;
        padding:9px 0;
        margin:5px;

        font-size:17px;

    }

    .footer-image{

        margin-top:70px;

    }

}

</style>

</head>

<body>

<main>

<img class="hero" src="Header.jpg" alt="Tokish J. Médeau">

<h1>Tokish J. Médeau</h1>

<h2>Author & Illustrator</h2>

<div class="tagline">
Southern Gothic • Magical Realism
</div>

<div class="buttons">

<a class="button" href="read.html">Read CHIVEY</a>

<a class="button" href="#">Articles</a>

<a class="button" href="#">Illustrations</a>

<a class="button" href="#">About</a>

</div>

<img class="footer-image" src="Footer.jpg" alt="Artwork">

</main>

</body>

</html>
